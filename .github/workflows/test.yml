name: Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build SDK and Demo
        run: ./gradlew assembleDebug
